blueprint:
  name: Daily Weather Notification (Pretty)
  description: >
    Sends a beautifully formatted daily weather notification with optional details
    and tomorrow's forecast. Supports multiple devices and rich emoji formatting.
  domain: automation

  input:
    weather_entity:
      name: Weather Entity
      selector:
        entity:
          filter:
            - domain: weather

    notify_devices:
      name: Devices to Notify
      selector:
        device:
          multiple: true
          integration: mobile_app

    time:
      name: Notification Time
      selector:
        time:

    include_details:
      name: Weather Details to Include
      selector:
        select:
          mode: list
          multiple: true
          options:
            - "condition"
            - "temperature"
            - "humidity"
            - "wind"
            - "uv"
            - "precipitation"

    include_tomorrow:
      name: Include Tomorrow's Forecast?
      selector:
        select:
          mode: dropdown
          options:
            - "yes"
            - "no"
      default: "yes"

variables:
  weather_entity: !input weather_entity
  include_details: !input include_details
  include_tomorrow: !input include_tomorrow

trigger:
  - platform: time
    at: !input time

action:
  - service: weather.get_forecasts
    data:
      type: daily
    target:
      entity_id: !input weather_entity
    response_variable: daily

  - variables:
      forecast: "{{ daily[weather_entity].forecast }}"
      today: "{{ forecast[0] }}"
      tomorrow: "{{ forecast[1] if forecast|length > 1 else None }}"

      icon: >-
        {% set c = today.condition %}
        {% if c == 'cloudy' %}mdi:clouds
        {% elif c == 'fog' %}mdi:weather-fog
        {% elif c == 'hail' %}mdi:weather-hail
        {% elif c == 'lightning' %}mdi:weather-lightning
        {% elif c == 'lightning-rainy' %}mdi:weather-lightning-rainy
        {% elif c == 'partlycloudy' %}mdi:weather-partly-cloudy
        {% elif c == 'pouring' %}mdi:weather-pouring
        {% elif c == 'rainy' %}mdi:weather-rainy
        {% elif c == 'snowy' %}mdi:weather-snowy
        {% elif c == 'snowy-rainy' %}mdi:weather-snowy-rainy
        {% elif c == 'sunny' %}mdi:weather-sunny
        {% elif c == 'windy' %}mdi:weather-windy
        {% elif c == 'windy-variant' %}mdi:weather-windy-variant
        {% elif c == 'exceptional' %}mdi:cloud-alert
        {% else %}mdi:sun-thermometer
        {% endif %}

  - repeat:
      for_each: !input notify_devices
      sequence:
        - service: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            title: "{{ state_attr(weather_entity, 'temperature') }}°C – {{ states(weather_entity) | capitalize }}"
            message: >-
              {% set weather = weather_entity %}

              {# --- TODAY --- #}

              {% if 'condition' in include_details %}
              🌤️ <b>Condition:</b> {{ today.condition|capitalize }}
              {% endif %}

              {% if 'temperature' in include_details %}
              🌡️ <b>Temp:</b> {{ today.temperature }}° / {{ today.templow }}°
              {% endif %}

              {% if 'humidity' in include_details and today.humidity is defined %}
              💧 <b>Humidity:</b> {{ today.humidity }}%
              {% endif %}

              {% if 'wind' in include_details %}
              💨 <b>Wind:</b> {{ today.wind_speed }} {{ state_attr(weather,'wind_speed_unit') }} ({{ today.wind_bearing }}°)
              {% endif %}

              {% if 'uv' in include_details and today.uv_index is defined %}
              🔆 <b>UV Index:</b> {{ today.uv_index }}
              {% endif %}

              {% if 'precipitation' in include_details %}
              🌧️ <b>Rain:</b> {{ today.precipitation }} {{ state_attr(weather,'precipitation_unit') }}
              {% endif %}

              {# --- TOMORROW --- #}

              {% if include_tomorrow == 'yes' and tomorrow %}
              📅 <b>Tomorrow:</b> {{ tomorrow.condition|capitalize }},
              {{ tomorrow.temperature }}° / {{ tomorrow.templow }}°,
              {{ tomorrow.precipitation }} {{ state_attr(weather,'precipitation_unit') }}
              {% endif %}

            data:
              notification_icon: "{{ icon }}"
