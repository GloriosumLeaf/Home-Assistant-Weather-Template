blueprint:
  name: Daily Weather Notification (Rich Android Markdown Only)
  description: Sends a customizable weather update to selected Android devices at a scheduled time using a rich Markdown card.
  domain: automation

  input:
    weather_entity:
      name: Weather Entity
      description: Select your weather integration entity.
      selector:
        entity:
          filter:
            - domain: weather

    notify_device:
      name: Devices to Notify
      description: Devices using the official HA Companion App.
      selector:
        device:
          multiple: true
          integration: mobile_app

    time:
      name: Notification Time
      description: When to send the weather update.
      selector:
        time:

    notification_title:
      name: Notification Title
      default: "Daily Weather Update"

    include_items:
      name: Weather Details to Include
      description: Select which items appear in the notification.
      selector:
        select:
          multiple: true
          mode: list
          options:
            - label: "Current Condition"
              value: "condition"
            - label: "Current Temperature"
              value: "temp_now"
            - label: "Today's High/Low"
              value: "temp_range"
            - label: "Humidity"
              value: "humidity"
            - label: "Wind Speed & Direction"
              value: "wind"
            - label: "UV Index"
              value: "uv"
            - label: "Chance of Rain"
              value: "rain_chance"

    include_tomorrow:
      name: Include Tomorrow's Forecast?
      selector:
        select:
          mode: dropdown
          options:
            - label: "Yes"
              value: "yes"
            - label: "No"
              value: "no"
      default: "yes"

    markdown_style:
      name: Markdown Style
      description: Choose how the Android rich notification is formatted.
      selector:
        select:
          mode: dropdown
          options:
            - label: "Clean & Minimal"
              value: "clean"
            - label: "Table Layout"
              value: "table"
            - label: "Compact Summary"
              value: "compact"
      default: "clean"

variables:
  weather_entity: !input weather_entity
  include_items: !input include_items
  include_tomorrow: !input include_tomorrow
  markdown_style: !input markdown_style

trigger:
  - platform: time
    at: !input time

action:
  - service: weather.get_forecasts
    data:
      type: daily
    target:
      entity_id: !input weather_entity
    response_variable: forecast_data

  - variables:
      today: "{{ forecast_data[weather_entity].forecast[0] }}"
      tomorrow: "{{ forecast_data[weather_entity].forecast[1] }}"
      u_temp: "{{ state_attr(weather_entity, 'temperature_unit') }}"
      u_speed: "{{ state_attr(weather_entity, 'wind_speed_unit') }}"
      u_precip: "{{ state_attr(weather_entity, 'precipitation_unit') }}"
      icon: >-
        {% set cond = today.condition %}
        {% if cond == 'cloudy' %}mdi:clouds
        {% elif cond == 'fog' %}mdi:weather-fog
        {% elif cond == 'hail' %}mdi:weather-hail
        {% elif cond == 'lightning' %}mdi:weather-lightning
        {% elif cond == 'lightning-rainy' %}mdi:weather-lightning-rainy
        {% elif cond == 'partlycloudy' %}mdi:weather-partly-cloudy
        {% elif cond == 'pouring' %}mdi:weather-pouring
        {% elif cond == 'rainy' %}mdi:weather-rainy
        {% elif cond == 'snowy' %}mdi:weather-snowy
        {% elif cond == 'snowy-rainy' %}mdi:weather-snowy-rainy
        {% elif cond == 'sunny' %}mdi:weather-sunny
        {% elif cond == 'windy' %}mdi:weather-windy
        {% elif cond == 'windy-variant' %}mdi:weather-windy-variant
        {% else %}mdi:sun-thermometer
        {% endif %}

  - repeat:
      for_each: !input notify_device
      sequence:
        - service: "notify.mobile_app_{{ device_attr(repeat.item, 'name') | slugify }}"
          data:
            message: "{{ notification_title }}"
            data:
              notification_icon: "{{ icon }}"
              markdown: >-
                {% set cond = today.condition | default('') %}
                {% set cond_cap = cond | capitalize %}
                {% set temp_now = state_attr(weather_entity, 'temperature') %}
                {% set humidity = state_attr(weather_entity, 'humidity') %}
                {% set uv = state_attr(weather_entity, 'uv_index') %}
                {% set precip_prob = today.precipitation_probability %}
                {% set wind_speed = today.wind_speed %}
                {% set wind_bearing = today.wind_bearing %}
                {% set t_cond = tomorrow.condition %}
                {% set t_high = tomorrow.temperature %}
                {% set t_low = tomorrow.templow %}
                {% set t_rain = tomorrow.precipitation %}

                {% if markdown_style == 'clean' %}
                ## {{ cond_cap if cond_cap else 'Weather' }} {% if cond_cap %}🌤️{% endif %}

                {% if 'temp_now' in include_items and temp_now is not none %}
                **Current Temp:** **{{ temp_now }} {{ u_temp }}**  
                {% endif %}

                {% if 'temp_range' in include_items %}
                  {% if today.temperature is not none %}
                **High:** **{{ today.temperature }} {{ u_temp }}**  
                  {% endif %}
                  {% if today.templow is not none %}
                **Low:** **{{ today.templow }} {{ u_temp }}**  
                  {% endif %}
                {% endif %}

                {% if 'humidity' in include_items and humidity is not none %}
                **Humidity:** **{{ humidity }}%**  
                {% endif %}

                {% if 'wind' in include_items %}
                  {% if wind_speed is not none %}
                **Wind:** **{{ wind_speed }} {{ u_speed }}**  
                  {% endif %}
                  {% if wind_bearing is not none %}
                **Direction:** **{{ wind_bearing }}°**  
                  {% endif %}
                {% endif %}

                {% if 'uv' in include_items and uv is not none %}
                **UV Index:** **{{ uv }}**  
                {% endif %}

                {% if 'rain_chance' in include_items and precip_prob is not none %}
                **Chance of Rain:** **{{ precip_prob }}%**  
                {% endif %}

                {% if include_tomorrow == 'yes' and (t_cond or t_high or t_low or t_rain) %}
                ### 📅 Tomorrow
                {% if t_cond %}• Condition: **{{ t_cond | capitalize }}**  
                {% endif %}
                {% if t_high %}• High: **{{ t_high }} {{ u_temp }}**  
                {% endif %}
                {% if t_low %}• Low: **{{ t_low }} {{ u_temp }}**  
                {% endif %}
                {% if t_rain %}• Rain: **{{ t_rain }} {{ u_precip }}**  
                {% endif %}
                {% endif %}

                {% elif markdown_style == 'table' %}
                ## {{ cond_cap if cond_cap else 'Weather' }} {% if cond_cap %}🌤️{% endif %}

                | Metric | Value |
                |-------:|:------|
                {% if 'temp_now' in include_items and temp_now is not none %}| Current Temp | **{{ temp_now }} {{ u_temp }}** |
                {% endif %}
                {% if 'temp_range' in include_items and today.temperature is not none %}| High | **{{ today.temperature }} {{ u_temp }}** |
                {% endif %}
                {% if 'temp_range' in include_items and today.templow is not none %}| Low | **{{ today.templow }} {{ u_temp }}** |
                {% endif %}
                {% if 'humidity' in include_items and humidity is not none %}| Humidity | **{{ humidity }}%** |
                {% endif %}
                {% if 'wind' in include_items and wind_speed is not none %}| Wind | **{{ wind_speed }} {{ u_speed }}** |
                {% endif %}
                {% if 'wind' in include_items and wind_bearing is not none %}| Direction | **{{ wind_bearing }}°** |
                {% endif %}
                {% if 'uv' in include_items and uv is not none %}| UV Index | **{{ uv }}** |
                {% endif %}
                {% if 'rain_chance' in include_items and precip_prob is not none %}| Chance of Rain | **{{ precip_prob }}%** |
                {% endif %}

                {% if include_tomorrow == 'yes' and (t_cond or t_high or t_low or t_rain) %}
                ### 📅 Tomorrow

                | Metric | Value |
                |-------:|:------|
                {% if t_cond %}| Condition | **{{ t_cond | capitalize }}** |
                {% endif %}
                {% if t_high %}| High | **{{ t_high }} {{ u_temp }}** |
                {% endif %}
                {% if t_low %}| Low | **{{ t_low }} {{ u_temp }}** |
                {% endif %}
                {% if t_rain %}| Rain | **{{ t_rain }} {{ u_precip }}** |
                {% endif %}
                {% endif %}

                {% else %}
                ## {{ cond_cap if cond_cap else 'Weather' }} {% if cond_cap %}🌤️{% endif %}

                {% set summary_parts = [] %}
                {% if 'temp_range' in include_items and today.temperature is not none and today.templow is not none %}
                  {% set _ = summary_parts.append(cond_cap ~ ' · ' ~ today.temperature|string ~ '° / ' ~ today.templow|string ~ '°') %}
                {% elif 'temp_now' in include_items and temp_now is not none %}
                  {% set _ = summary_parts.append(cond_cap ~ ' · ' ~ temp_now|string ~ '°') %}
                {% endif %}

                {% if 'rain_chance' in include_items and precip_prob is not none %}
                  {% set _ = summary_parts.append(precip_prob|string ~ '% rain') %}
                {% endif %}

                {{ summary_parts | join(' · ') }}

                {% if 'temp_now' in include_items and temp_now is not none %}

                🌡️ **{{ temp_now }} {{ u_temp }}** now  
                {% endif %}
                {% if 'humidity' in include_items and humidity is not none %}
                💧 **{{ humidity }}%** humidity  
                {% endif %}
                {% if 'wind' in include_items and wind_speed is not none %}
                🌬️ **{{ wind_speed }} {{ u_speed }}** wind  
                {% endif %}

                {% if include_tomorrow == 'yes' and (t_cond or t_high or t_low or t_rain) %}
                ### 📅 Tomorrow
                {% set t_summary = [] %}
                {% if t_cond %}{% set _ = t_summary.append(t_cond | capitalize) %}{% endif %}
                {% if t_high and t_low %}{% set _ = t_summary.append(t_high|string ~ '° / ' ~ t_low|string ~ '°') %}{% endif %}
                {% if t_rain %}{% set _ = t_summary.append(t_rain|string ~ '% rain') %}{% endif %}
                {{ t_summary | join(' · ') }}
                {% endif %}
                {% endif %}
